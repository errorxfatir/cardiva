<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cardiva</title>
    <link rel="icon" href="/images/cardia-removebg.png" sizes="32x32" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
    <nav>
        <a href="#"><img src="/images/cardia-removebg.png" alt="Cardiva Logo" width="50"></a>
        <a href="index.html">Home</a>
        <a href="#">My Plans</a>
        <a href="#">Login</a>
    </nav>
    </header>
    <section id="auth">
        <div class="login-form">
        <h2>Login</h2>
        <form>
        <label for="email">Email</label>
        <br>
        <input type="email" id="email" name="email">
        <br>
        <label for="password">Password</label>
        <br>
        <input type="password" id="password" name="password">
        <br>
        <button type="submit">Login</button>
        </form> 
</div>
    <div class="signup-form">
        <h2>Sign Up</h2>
        <form>
        <label for="fullname">Full Name</label>
        <br>
        <input type="text" name="fullname" id="fullname">
        <br>
        <label for="signupmail">Email</label>
        <br>
        <input type="email" name="signupmail" id="signupmail">
        <br>
        <label for="signuppassword">Password</label>
        <br>
        <input type="password" name="signuppassword" id="signuppassword">
        <br>
        <label for="confirmpassword">Confirm Password</label>
        <br> 
        <input type="password" name="confirmpassword" id="confirmpassword">
        <button type="submit">Create Account</button>
        </form>
    </div>
    </section>
    <footer>
        <p>&copy; 2026 Cardiva. All rights reserved.</p>
        <a href="index.html">Home</a>
        <a href="#">My Plans</a>
        <a href="login.html">Login</a>
    </footer>
</body>
</html>
